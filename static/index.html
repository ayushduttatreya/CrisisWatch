<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrisisWatch - Real-Time News Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
        }
        
        h1 span {
            color: #ef4444;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Sentiment Banner */
        .sentiment-banner {
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .sentiment-banner.normal {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-left: 4px solid #22c55e;
        }
        
        .sentiment-banner.spike {
            background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 100%);
            border-left: 4px solid #ef4444;
            animation: alert-pulse 1s infinite;
        }
        
        @keyframes alert-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        
        .sentiment-value {
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .sentiment-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .alert-badge {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Cards */
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        
        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #3b82f6;
            border-radius: 2px;
        }
        
        /* Trend Chart */
        .chart-container {
            height: 250px;
            position: relative;
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
        }
        
        #trendChart {
            width: 100%;
            height: 100%;
        }
        
        /* Headlines Table */
        .headlines-container {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .headline-item {
            padding: 16px;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }
        
        .headline-item:hover {
            background: #334155;
        }
        
        .headline-item:last-child {
            border-bottom: none;
        }
        
        .headline-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #f8fafc;
            text-decoration: none;
            display: block;
        }
        
        .headline-title:hover {
            color: #3b82f6;
        }
        
        .headline-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        .sentiment-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .sentiment-positive {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .sentiment-negative {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .sentiment-neutral {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        
        /* Alerts Panel */
        .alerts-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .alert-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        
        .alert-item.crisis {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }
        
        .alert-item.info {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        
        .alert-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .alert-item.crisis .alert-type {
            color: #ef4444;
        }
        
        .alert-item.info .alert-type {
            color: #3b82f6;
        }
        
        .alert-msg {
            font-size: 0.9rem;
            color: #e2e8f0;
        }
        
        .alert-time {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #3b82f6;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Crisis<span>Watch</span></h1>
            <div class="status">
                <div class="status-dot"></div>
                <span id="statusText">Live</span>
            </div>
        </header>

        <div id="sentimentBanner" class="sentiment-banner normal">
            <div>
                <div class="sentiment-label">Global Sentiment</div>
                <div id="sentimentValue" class="sentiment-value">0.00</div>
            </div>
            <div id="alertBadge" style="display: none;" class="alert-badge">⚠ CRISIS DETECTED</div>
        </div>

        <div class="dashboard-grid">
            <div class="left-column">
                <div class="card">
                    <h2>Sentiment Trend (Last 60 Points)</h2>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <div class="card" style="margin-top: 30px;">
                    <h2>Latest Headlines</h2>
                    <div id="headlinesList" class="headlines-container">
                        <div class="no-data">Loading headlines...</div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="card">
                    <h2>Alert Panel</h2>
                    <div id="alertsList" class="alerts-list">
                        <div class="no-data">No alerts yet</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div id="totalArticles" class="stat-value">-</div>
                <div class="stat-label">Total Articles</div>
            </div>
            <div class="stat-box">
                <div id="refreshTime" class="stat-value">30s</div>
                <div class="stat-label">Live Update</div>
            </div>
            <div class="stat-box">
                <div id="dataPoints" class="stat-value">-</div>
                <div class="stat-label">Trend Points</div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const REFRESH_INTERVAL = 30000; // 30 seconds for live dashboard updates
        const API_BASE = '';
        
        // State
        let trendData = [];
        
        // DOM Elements
        const sentimentBanner = document.getElementById('sentimentBanner');
        const sentimentValue = document.getElementById('sentimentValue');
        const alertBadge = document.getElementById('alertBadge');
        const headlinesList = document.getElementById('headlinesList');
        const alertsList = document.getElementById('alertsList');
        const totalArticles = document.getElementById('totalArticles');
        const dataPoints = document.getElementById('dataPoints');
        const statusText = document.getElementById('statusText');
        const trendCanvas = document.getElementById('trendChart');
        
        // Mock data fallback
        const mockData = {
            articles: {
                articles: [
                    { title: "Global markets show resilience amid uncertainty", source: "Reuters", sentiment: 0.25, category: "business", url: "#", fetched_at: new Date().toISOString() },
                    { title: "New climate agreement reached at summit", source: "BBC", sentiment: 0.42, category: "world", url: "#", fetched_at: new Date().toISOString() },
                    { title: "Economic concerns grow as inflation persists", source: "Bloomberg", sentiment: -0.35, category: "business", url: "#", fetched_at: new Date().toISOString() },
                    { title: "Tech sector reports strong quarterly earnings", source: "TechCrunch", sentiment: 0.58, category: "technology", url: "#", fetched_at: new Date().toISOString() },
                    { title: "Conflict escalation reported in border region", source: "Al Jazeera", sentiment: -0.67, category: "world", url: "#", fetched_at: new Date().toISOString() }
                ]
            },
            stats: {
                total: 5,
                mood_avg: 0.05,
                is_spike: false,
                alerts: []
            },
            trend: {
                trend: [0.1, 0.05, 0.0, -0.05, -0.1, -0.05, 0.0, 0.05, 0.1, 0.05]
            }
        };
        
        // Fetch all data
        async function fetchData() {
            try {
                const [articlesRes, statsRes, trendRes] = await Promise.all([
                    fetch(`${API_BASE}/api/articles?limit=20&order=desc`),
                    fetch(`${API_BASE}/api/stats`),
                    fetch(`${API_BASE}/api/trend`)
                ]);
                
                if (!articlesRes.ok || !statsRes.ok || !trendRes.ok) {
                    throw new Error('API error');
                }
                
                const articles = await articlesRes.json();
                const stats = await statsRes.json();
                const trend = await trendRes.json();
                
                updateDashboard(articles, stats, trend);
                statusText.textContent = 'Live';
                
            } catch (error) {
                console.error('API fetch failed, using mock data:', error);
                statusText.textContent = 'Demo Mode';
                updateDashboard(mockData.articles, mockData.stats, mockData.trend);
            }
        }
        
        // Update dashboard with data
        function updateDashboard(articles, stats, trend) {
            // Update sentiment banner
            const moodAvg = stats.mood_avg || 0;
            sentimentValue.textContent = moodAvg.toFixed(2);
            
            if (stats.is_spike) {
                sentimentBanner.className = 'sentiment-banner spike';
                alertBadge.style.display = 'block';
            } else {
                sentimentBanner.className = 'sentiment-banner normal';
                alertBadge.style.display = 'none';
            }
            
            // Update stats
            totalArticles.textContent = stats.total || 0;
            dataPoints.textContent = trend.trend?.length || 0;
            
            // Update trend chart
            if (trend.trend && trend.trend.length > 0) {
                trendData = trend.trend;
                drawTrendChart();
            }
            
            // Update headlines
            if (articles.articles && articles.articles.length > 0) {
                renderHeadlines(articles.articles);
            }
            
            // Update alerts
            if (stats.alerts) {
                renderAlerts(stats.alerts);
            }
        }
        
        // Render headlines
        function renderHeadlines(articles) {
            headlinesList.innerHTML = articles.map(article => {
                const sentimentClass = article.sentiment > 0.05 ? 'sentiment-positive' 
                    : article.sentiment < -0.05 ? 'sentiment-negative' 
                    : 'sentiment-neutral';
                const sentimentLabel = article.sentiment > 0.05 ? 'Positive' 
                    : article.sentiment < -0.05 ? 'Negative' 
                    : 'Neutral';
                
                return `
                    <div class="headline-item">
                        <a href="${article.url}" target="_blank" class="headline-title">${escapeHtml(article.title)}</a>
                        <div class="headline-meta">
                            <span>${escapeHtml(article.source)}</span>
                            <span class="sentiment-badge ${sentimentClass}">${sentimentLabel} (${article.sentiment.toFixed(2)})</span>
                            <span>${formatTime(article.fetched_at)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Render alerts
        function renderAlerts(alerts) {
            if (alerts.length === 0) {
                alertsList.innerHTML = '<div class="no-data">No active alerts</div>';
                return;
            }
            
            alertsList.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.type}">
                    <div class="alert-type">${alert.type}</div>
                    <div class="alert-msg">${escapeHtml(alert.msg)}</div>
                    <div class="alert-time">${formatTime(alert.time)}</div>
                </div>
            `).join('');
        }
        
        // Draw trend chart on canvas
        function drawTrendChart() {
            const ctx = trendCanvas.getContext('2d');
            const width = trendCanvas.offsetWidth;
            const height = trendCanvas.offsetHeight;
            
            // Set canvas size
            trendCanvas.width = width;
            trendCanvas.height = height;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            if (trendData.length === 0) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for first fetch...', width / 2, height / 2);
                return;
            }
            
            // Chart settings
            const padding = 30;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;
            
            // Find min/max
            const min = Math.min(...trendData, -0.5);
            const max = Math.max(...trendData, 0.5);
            const range = max - min || 1;
            
            // Draw zero line
            const zeroY = padding + chartHeight - ((0 - min) / range) * chartHeight;
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(padding, zeroY);
            ctx.lineTo(width - padding, zeroY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw trend line
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            trendData.forEach((value, index) => {
                const x = padding + (index / (trendData.length - 1)) * chartWidth;
                const y = padding + chartHeight - ((value - min) / range) * chartHeight;
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            
            // Draw points
            trendData.forEach((value, index) => {
                const x = padding + (index / (trendData.length - 1)) * chartWidth;
                const y = padding + chartHeight - ((value - min) / range) * chartHeight;
                
                ctx.fillStyle = value < -0.3 ? '#ef4444' : value > 0.3 ? '#22c55e' : '#3b82f6';
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(max.toFixed(2), padding - 5, padding + 10);
            ctx.fillText(min.toFixed(2), padding - 5, height - padding);
            ctx.textAlign = 'center';
            ctx.fillText('0.00', padding - 5, zeroY + 4);
        }
        
        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Utility: Format time
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = (now - date) / 1000; // seconds
            
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }
        
        // Initial load
        fetchData();
        
        // Auto refresh
        setInterval(fetchData, REFRESH_INTERVAL);
        
        // Handle window resize
        window.addEventListener('resize', drawTrendChart);
    </script>
</body>
</html>
