version: '3.8'

services:
  # Backend API service
  backend:
    build: .
    container_name: crisiswatch-backend
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/crisiswatch.db
      - FLASK_PORT=5000
    volumes:
      # Use a named volume for easier resets via 'docker compose down -v'
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - crisiswatch-net

  # Frontend service (nginx serving built React app)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crisiswatch-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crisiswatch-net

networks:
  crisiswatch-net:
    driver: bridge

volumes:
  # To reset the database schema, run: docker compose down -v
  db_data:
