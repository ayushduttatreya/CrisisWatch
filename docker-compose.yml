version: '3.8'

services:
  crisiswatch:
    build: .
    container_name: crisiswatch
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/crisiswatch.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Add nginx for production
  nginx:
    image: nginx:alpine
    container_name: crisiswatch-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crisiswatch
    restart: unless-stopped
    profiles:
      - prod
